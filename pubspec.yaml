name: adaptive_shell
description: "An adaptive master-detail layout wrapper for Flutter. Automatically switches
  between BottomNavigationBar (mobile) and NavigationRail (tablet/web/desktop),
  showing child1 always and child2 beside it on larger screens. Follows
  Material 3 window size classes and Flutter adaptive design best practices"
version: 1.0.0+1
repository: https://github.com/RakeshGowdaR/adaptive_shell
issue_tracker: https://github.com/RakeshGowdaR/adaptive_shell/issues
homepage: https://github.com/RakeshGowdaR/adaptive_shell

topics:
  - adaptive
  - responsive
  - layout
  - navigation
  - ui

screenshots:
  - description: 'Compact mode (mobile) with BottomNavigationBar'
    path: screenshots/compact.png
  - description: 'Expanded mode (tablet) with NavigationRail and master-detail'
    path: screenshots/expanded.png

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
